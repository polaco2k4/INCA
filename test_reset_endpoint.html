<!DOCTYPE html>
<html>
<head>
    <title>Test Reset Endpoint</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        #result { margin-top: 20px; padding: 10px; background: #f5f5f5; border-radius: 5px; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e8; color: #2e7d32; }
    </style>
</head>
<body>
    <h1>Test Reset Endpoint</h1>
    <button onclick="testEndpoint()">Testar /api/reset-solicitar</button>
    <div id="result"></div>

    <script>
        async function testEndpoint() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>A testar endpoint...</p>';
            
            try {
                console.log('Iniciando teste...');
                
                const response = await fetch('/api/reset-solicitar', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        nbi: 'DEMO-006-UIG-2026', 
                        email: 'joao@example.com' 
                    })
                });

                console.log('Response status:', response.status);
                console.log('Response headers:', [...response.headers.entries()]);

                const contentType = response.headers.get('content-type');
                console.log('Content-Type:', contentType);

                if (contentType && contentType.includes('application/json')) {
                    const data = await response.json();
                    console.log('JSON response:', data);
                    resultDiv.innerHTML = `<div class="success"><h2>✅ Sucesso!</h2><pre>${JSON.stringify(data, null, 2)}</pre></div>`;
                } else {
                    const text = await response.text();
                    console.log('Text response:', text);
                    resultDiv.innerHTML = `<div class="error"><h2>❌ Erro - Resposta não JSON</h2><p>Status: ${response.status}</p><pre>${text.substring(0, 1000)}...</pre></div>`;
                }
            } catch (error) {
                console.error('Erro:', error);
                resultDiv.innerHTML = `<div class="error"><h2>❌ Erro de conexão</h2><pre>${error.message}</pre></div>`;
            }
        }
    </script>
</body>
</html>
